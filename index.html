<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理系统</title>
<style>
/* ========================================
   CSS Custom Properties
   ======================================== */
:root {
  --primary-50: #EEF2FF;
  --primary-100: #E0E7FF;
  --primary-200: #C7D2FE;
  --primary-300: #A5B4FC;
  --primary-400: #818CF8;
  --primary-500: #6366F1;
  --primary-600: #4F46E5;
  --primary-700: #4338CA;
  --primary-800: #3730A3;
  --primary-900: #312E81;

  --slate-50: #F8FAFC;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --slate-950: #020617;

  --success: #10B981;
  --success-light: #D1FAE5;
  --success-dark: #065F46;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --warning-dark: #92400E;
  --error: #EF4444;
  --error-light: #FEE2E2;
  --error-dark: #991B1B;
  --info: #3B82F6;
  --info-light: #DBEAFE;
  --info-dark: #1E40AF;

  --sidebar-width: 240px;
  --header-height: 64px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.06);
  --transition: 150ms ease;
}

/* ========================================
   Reset & Base
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--slate-800);
  background: var(--slate-100);
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  border: none;
  background: none;
  outline: none;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  outline: none;
}

a { color: var(--primary-600); text-decoration: none; }
a:hover { color: var(--primary-700); }

/* ========================================
   Layout
   ======================================== */
.app-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--slate-900);
  color: var(--slate-300);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 24px 20px;
  border-bottom: 1px solid var(--slate-700);
}

.sidebar-brand h1 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand h1 svg { flex-shrink: 0; }

.sidebar-brand p {
  font-size: 12px;
  color: var(--slate-500);
  margin-top: 4px;
  padding-left: 34px;
}

.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--slate-500);
  padding: 8px 12px 4px;
  margin-top: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  color: var(--slate-400);
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  cursor: pointer;
  width: 100%;
  text-align: left;
}

.nav-item:hover {
  background: var(--slate-800);
  color: var(--slate-200);
}

.nav-item.active {
  background: var(--primary-600);
  color: #fff;
}

.nav-item.active svg { opacity: 1; }

.nav-item svg {
  width: 20px;
  height: 20px;
  opacity: 0.7;
  flex-shrink: 0;
}

/* Main Area */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  height: var(--header-height);
  min-height: var(--header-height);
  background: #fff;
  border-bottom: 1px solid var(--slate-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--slate-900);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.content-inner {
  max-width: 1200px;
  margin: 0 auto;
}

/* ========================================
   Components: Cards
   ======================================== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}

.kpi-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--slate-200);
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: box-shadow var(--transition), transform var(--transition);
}

.kpi-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.kpi-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.kpi-icon svg { width: 24px; height: 24px; }

.kpi-icon.blue { background: var(--info-light); color: var(--info); }
.kpi-icon.amber { background: var(--warning-light); color: var(--warning); }
.kpi-icon.green { background: var(--success-light); color: var(--success); }
.kpi-icon.indigo { background: var(--primary-100); color: var(--primary-600); }

.kpi-info { flex: 1; }

.kpi-label {
  font-size: 13px;
  color: var(--slate-500);
  font-weight: 500;
  margin-bottom: 4px;
}

.kpi-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--slate-900);
  line-height: 1.2;
}

.kpi-sub {
  font-size: 12px;
  color: var(--slate-400);
  margin-top: 4px;
}

/* ========================================
   Components: Tables
   ======================================== */
.card {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--slate-200);
  overflow: hidden;
}

.card-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--slate-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--slate-800);
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--slate-500);
  background: var(--slate-50);
  border-bottom: 1px solid var(--slate-200);
  white-space: nowrap;
}

tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--slate-100);
  color: var(--slate-700);
  vertical-align: middle;
}

tbody tr {
  transition: background var(--transition);
}

tbody tr:hover {
  background: var(--slate-50);
}

tbody tr:last-child td {
  border-bottom: none;
}

.td-primary {
  font-weight: 600;
  color: var(--slate-800);
}

.td-mono {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 13px;
}

.td-secondary {
  color: var(--slate-500);
  font-size: 13px;
}

/* ========================================
   Components: Badges
   ======================================== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 9999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.badge-pending   { background: var(--warning-light); color: var(--warning-dark); }
.badge-confirmed { background: var(--info-light); color: var(--info-dark); }
.badge-producing { background: #F3E8FF; color: #6B21A8; }
.badge-shipped   { background: #CFFAFE; color: #155E75; }
.badge-completed { background: var(--success-light); color: var(--success-dark); }

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.badge-pending .badge-dot   { background: var(--warning); }
.badge-confirmed .badge-dot { background: var(--info); }
.badge-producing .badge-dot { background: #9333EA; }
.badge-shipped .badge-dot   { background: #0891B2; }
.badge-completed .badge-dot { background: var(--success); }

/* ========================================
   Components: Buttons
   ======================================== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-md);
  font-weight: 500;
  font-size: 14px;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn svg { width: 16px; height: 16px; }

.btn-primary {
  background: var(--primary-600);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-700); }

.btn-secondary {
  background: #fff;
  color: var(--slate-700);
  border: 1px solid var(--slate-300);
}
.btn-secondary:hover { background: var(--slate-50); border-color: var(--slate-400); }

.btn-ghost {
  color: var(--slate-600);
  padding: 6px 8px;
}
.btn-ghost:hover { background: var(--slate-100); color: var(--slate-800); }

.btn-danger {
  background: var(--error);
  color: #fff;
}
.btn-danger:hover { background: #DC2626; }

.btn-success {
  background: var(--success);
  color: #fff;
}
.btn-success:hover { background: #059669; }

.btn-sm {
  padding: 5px 10px;
  font-size: 13px;
}
.btn-sm svg { width: 14px; height: 14px; }

.btn-icon {
  padding: 6px;
  border-radius: var(--radius-sm);
}

.btn-group {
  display: flex;
  gap: 4px;
}

/* ========================================
   Components: Filters
   ======================================== */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--slate-100);
  flex-wrap: wrap;
}

.filter-input,
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--slate-300);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--slate-700);
  background: #fff;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.filter-input:focus,
.filter-select:focus {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px var(--primary-100);
}

.filter-input { width: 200px; }
.filter-select { min-width: 140px; }
.filter-input[type="date"] { width: 150px; }

.filter-label {
  font-size: 12px;
  color: var(--slate-500);
  font-weight: 500;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ========================================
   Components: Modal
   ======================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
  animation: fadeIn 150ms ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  width: 100%;
  max-height: calc(100vh - 48px);
  display: flex;
  flex-direction: column;
  animation: slideUp 200ms ease;
}

.modal-sm { max-width: 480px; }
.modal-md { max-width: 640px; }
.modal-lg { max-width: 800px; }
.modal-xl { max-width: 960px; }

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--slate-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--slate-900);
}

.modal-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--slate-400);
  transition: all var(--transition);
}
.modal-close:hover { background: var(--slate-100); color: var(--slate-600); }

.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--slate-200);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ========================================
   Components: Forms
   ======================================== */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--slate-700);
  margin-bottom: 6px;
}

.form-label .required {
  color: var(--error);
  margin-left: 2px;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--slate-300);
  border-radius: var(--radius-md);
  font-size: 14px;
  color: var(--slate-800);
  background: #fff;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px var(--primary-100);
}

.form-input.error,
.form-select.error {
  border-color: var(--error);
}

.form-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 4px;
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ========================================
   Components: Status Progress
   ======================================== */
.status-flow {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 16px 0;
}

.status-step {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  position: relative;
}

.status-step:not(:last-child)::after {
  content: '';
  flex: 1;
  height: 2px;
  background: var(--slate-200);
  margin: 0 8px;
}

.status-step.reached:not(:last-child)::after {
  background: var(--primary-400);
}

.status-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  border: 2px solid var(--slate-300);
  background: #fff;
  color: var(--slate-400);
}

.status-step.reached .status-dot {
  border-color: var(--primary-500);
  background: var(--primary-500);
  color: #fff;
}

.status-step.current .status-dot {
  border-color: var(--primary-600);
  background: var(--primary-600);
  color: #fff;
  box-shadow: 0 0 0 4px var(--primary-100);
}

.status-label {
  font-size: 12px;
  color: var(--slate-400);
  font-weight: 500;
  white-space: nowrap;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 6px;
}

.status-step.reached .status-label,
.status-step.current .status-label {
  color: var(--primary-700);
  font-weight: 600;
}

/* ========================================
   Components: Toast
   ======================================== */
.toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn 200ms ease, fadeOut 300ms ease 2.7s forwards;
  min-width: 240px;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

.toast svg { width: 18px; height: 18px; flex-shrink: 0; }

.toast-success {
  background: var(--success);
  color: #fff;
}

.toast-error {
  background: var(--error);
  color: #fff;
}

.toast-info {
  background: var(--info);
  color: #fff;
}

/* ========================================
   Components: Empty State
   ======================================== */
.empty-state {
  text-align: center;
  padding: 60px 24px;
}

.empty-state svg {
  width: 64px;
  height: 64px;
  color: var(--slate-300);
  margin-bottom: 16px;
}

.empty-state h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--slate-600);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  color: var(--slate-400);
  margin-bottom: 20px;
}

/* ========================================
   Components: Detail View
   ======================================== */
.detail-section {
  margin-bottom: 24px;
}

.detail-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--slate-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--slate-100);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 24px;
}

.detail-label {
  font-size: 12px;
  color: var(--slate-500);
  margin-bottom: 2px;
}

.detail-value {
  font-size: 14px;
  color: var(--slate-800);
  font-weight: 500;
}

/* ========================================
   Components: Order Items Table in Form
   ======================================== */
.order-items-table {
  width: 100%;
  margin-top: 8px;
}

.order-items-table th {
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--slate-500);
  text-align: left;
  background: var(--slate-50);
  border-bottom: 1px solid var(--slate-200);
}

.order-items-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--slate-100);
  vertical-align: middle;
}

.order-items-table .form-input,
.order-items-table .form-select {
  padding: 6px 8px;
  font-size: 13px;
}

.order-items-table .btn-icon {
  padding: 4px;
}

.order-total-row {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 2px solid var(--slate-200);
  font-size: 16px;
}

.order-total-label {
  font-weight: 600;
  color: var(--slate-600);
}

.order-total-value {
  font-weight: 700;
  color: var(--slate-900);
  font-size: 20px;
}

/* ========================================
   Confirm Dialog
   ======================================== */
.confirm-body {
  text-align: center;
  padding: 8px 0;
}

.confirm-body svg {
  width: 48px;
  height: 48px;
  color: var(--warning);
  margin-bottom: 12px;
}

.confirm-body p {
  font-size: 15px;
  color: var(--slate-700);
  margin-bottom: 4px;
}

.confirm-body .confirm-sub {
  font-size: 13px;
  color: var(--slate-500);
}

/* ========================================
   Clickable Row
   ======================================== */
.clickable-row {
  cursor: pointer;
}

/* ========================================
   Misc Utilities
   ======================================== */
.text-right { text-align: right; }
.text-center { text-align: center; }
.font-mono { font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; }
.nowrap { white-space: nowrap; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }
.gap-8 { gap: 8px; }
</style>
</head>
<body>

<div id="app" class="app-layout"></div>
<div id="modal-root"></div>
<div class="toast-container" id="toast-container"></div>

<script>
/* ========================================
   Icons (Inline SVG)
   ======================================== */

/* ========================================
   Utility Functions
   ======================================== */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

function formatCurrency(n) {
  return '¥' + Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return formatDate(iso) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function isToday(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function isThisMonth(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ========================================
   Status Definitions
   ======================================== */
const STATUS_LIST = [
  { key: 'pending',   label: '待确认', badge: 'badge-pending' },
  { key: 'confirmed', label: '已确认', badge: 'badge-confirmed' },
  { key: 'producing', label: '生产中', badge: 'badge-producing' },
  { key: 'shipped',   label: '已发货', badge: 'badge-shipped' },
  { key: 'completed', label: '已完成', badge: 'badge-completed' },
];

function getStatusInfo(key) {
  return STATUS_LIST.find(s => s.key === key) || STATUS_LIST[0];
}

function getNextStatus(key) {
  const idx = STATUS_LIST.findIndex(s => s.key === key);
  if (idx < 0 || idx >= STATUS_LIST.length - 1) return null;
  return STATUS_LIST[idx + 1];
}

function renderStatusBadge(key) {
  const s = getStatusInfo(key);
  return `<span class="badge ${s.badge}"><span class="badge-dot"></span>${escapeHtml(s.label)}</span>`;
}

/* ========================================
   Data Store (localStorage)
   ======================================== */
const STORE_KEYS = { customers: 'om_customers', products: 'om_products', orders: 'om_orders' };

const Store = {
  get(key) {
    try {
      return JSON.parse(localStorage.getItem(STORE_KEYS[key])) || [];
    } catch { return []; }
  },
  set(key, data) {
    try {
      localStorage.setItem(STORE_KEYS[key], JSON.stringify(data));
    } catch (e) {
      showToast('存储空间不足，请清理浏览器数据', 'error');
    }
  },
  getCustomers()    { return this.get('customers'); },
  getProducts()     { return this.get('products'); },
  getOrders()       { return this.get('orders'); },
  saveCustomers(d)  { this.set('customers', d); },
  saveProducts(d)   { this.set('products', d); },
  saveOrders(d)     { this.set('orders', d); },
};

/* ========================================

   ======================================== */
const state = {
  view: 'dashboard',
  orderFilters: { status: '', customerId: '', search: '', dateFrom: '', dateTo: '' },
  modal: null, // { type, data }
};

/* ========================================
   Toast System
   ======================================== */
function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const icon = type === 'success' ? Icons.check : type === 'error' ? Icons.x : Icons.check;
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `${icon}<span>${escapeHtml(message)}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

/* ========================================
   Navigation
   ======================================== */
function navigate(view) {
  state.view = view;
  render();
}

/* ========================================
   Modal Management
   ======================================== */
function openModal(type, data = null) {
  state.modal = { type, data };
  renderModal();
}

function closeModal() {
  state.modal = null;
  document.getElementById('modal-root').innerHTML = '';
}

/* ========================================
   Render: App Shell
   ======================================== */
function render() {
  const app = document.getElementById('app');
  const views = { dashboard: 'renderDashboard', orders: 'renderOrders', customers: 'renderCustomers', products: 'renderProducts' };
  const viewTitles = { dashboard: '仪表盘', orders: '订单管理', customers: '客户管理', products: '商品管理' };

  app.innerHTML = `
    ${renderSidebar()}
    <div class="main-area">
      ${renderHeader(viewTitles[state.view])}
      <div class="content">
        <div class="content-inner" id="view-content"></div>
      </div>
    </div>
  `;

  const contentEl = document.getElementById('view-content');
  const fn = views[state.view];
  if (fn && typeof window[fn] === 'function') {
    contentEl.innerHTML = window[fn]();
  }

  bindNavEvents();
  bindViewEvents();
}

function renderSidebar() {
  const items = [
    { view: 'dashboard', icon: Icons.dashboard, label: '仪表盘' },
    { view: 'orders',    icon: Icons.orders,    label: '订单管理' },
    { view: 'customers', icon: Icons.customers, label: '客户管理' },
    { view: 'products',  icon: Icons.products,  label: '商品管理' },
  ];

  return `
    <nav class="sidebar">
      <div class="sidebar-brand">
        <h1>${Icons.inbox} 订单管理</h1>
        <p>内部管理工具</p>
      </div>
      <div class="sidebar-nav">
        <div class="sidebar-section-label">主菜单</div>
        ${items.map(it => `
          <button class="nav-item ${state.view === it.view ? 'active' : ''}" data-nav="${it.view}">
            ${it.icon}
            <span>${it.label}</span>
          </button>
        `).join('')}
      </div>
    </nav>
  `;
}

function renderHeader(title) {
  const actions = [];
  if (state.view === 'orders') {
    actions.push(`<button class="btn btn-secondary btn-sm" onclick="handleExport()">${Icons.download} 导出</button>`);
    actions.push(`<button class="btn btn-primary btn-sm" onclick="openModal('orderForm')">${Icons.plus} 新建订单</button>`);
  }
  if (state.view === 'customers') {
    actions.push(`<button class="btn btn-primary btn-sm" onclick="openModal('customerForm')">${Icons.plus} 新增客户</button>`);
  }
  if (state.view === 'products') {
    actions.push(`<button class="btn btn-primary btn-sm" onclick="openModal('productForm')">${Icons.plus} 新增商品</button>`);
  }

  return `
    <header class="header">
      <h2 class="header-title">${title}</h2>
      <div class="header-actions">${actions.join('')}</div>
    </header>
  `;
}

function bindNavEvents() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.nav));
  });
}

/* ========================================
   View Event Binding
   ======================================== */
function bindViewEvents() {
  // Order filters
  const searchInput = document.getElementById('filter-search');
  const statusSelect = document.getElementById('filter-status');
  const customerSelect = document.getElementById('filter-customer');
  const dateFrom = document.getElementById('filter-date-from');
  const dateTo = document.getElementById('filter-date-to');

  if (searchInput) {
    let debounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        state.orderFilters.search = searchInput.value;
        const contentEl = document.getElementById('view-content');
        contentEl.innerHTML = renderOrders();
        bindViewEvents();
      }, 300);
    });
  }
  [statusSelect, customerSelect, dateFrom, dateTo].forEach(el => {
    if (el) {
      el.addEventListener('change', () => {
        if (statusSelect) state.orderFilters.status = statusSelect.value;
        if (customerSelect) state.orderFilters.customerId = customerSelect.value;
        if (dateFrom) state.orderFilters.dateFrom = dateFrom.value;
        if (dateTo) state.orderFilters.dateTo = dateTo.value;
        const contentEl = document.getElementById('view-content');
        contentEl.innerHTML = renderOrders();
        bindViewEvents();
      });
    }
  });
}

/* ========================================
   Render: Modals
   ======================================== */
function renderModal() {
  const root = document.getElementById('modal-root');
  if (!state.modal) { root.innerHTML = ''; return; }

  const { type, data } = state.modal;

  switch (type) {
    case 'orderForm':    root.innerHTML = renderOrderFormModal(data); bindOrderForm(); break;
    case 'orderDetail':  root.innerHTML = renderOrderDetailModal(data); break;
    case 'customerForm': root.innerHTML = renderCustomerFormModal(data); bindCustomerForm(); break;
    case 'productForm':  root.innerHTML = renderProductFormModal(data); bindProductForm(); break;
    case 'confirmDelete': root.innerHTML = renderConfirmModal(data); break;
    default: root.innerHTML = '';
  }
}

function refreshOrderItems() {
  const container = document.getElementById('order-items-container');
  if (container) {
    container.innerHTML = renderOrderItemsTable();
    bindOrderItemEvents();
  }
}

function bindOrderForm() {
  bindOrderItemEvents();
}

function bindOrderItemEvents() {
  // Product select change
  document.querySelectorAll('.oi-product').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const opt = e.target.selectedOptions[0];
      if (opt && opt.value) {
        orderFormItems[idx].productId = opt.value;
        orderFormItems[idx].productName = opt.dataset.name || '';
        orderFormItems[idx].price = parseFloat(opt.dataset.price) || 0;
        orderFormItems[idx].subtotal = orderFormItems[idx].price * orderFormItems[idx].quantity;
      } else {
        orderFormItems[idx].productId = '';
        orderFormItems[idx].productName = '';
        orderFormItems[idx].price = 0;
        orderFormItems[idx].subtotal = 0;
      }
      refreshOrderItems();
    });
  });

  // Quantity change
  document.querySelectorAll('.oi-qty').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const qty = Math.max(1, parseInt(e.target.value) || 1);
      orderFormItems[idx].quantity = qty;
      orderFormItems[idx].subtotal = orderFormItems[idx].price * qty;
      refreshOrderItems();
    });
  });

  // Remove item
  document.querySelectorAll('.oi-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(e.currentTarget.dataset.idx);
      orderFormItems.splice(idx, 1);
      refreshOrderItems();
    });
  });

  // Add item
  const addBtn = document.getElementById('add-order-item');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      orderFormItems.push({ _id: uid(), productId: '', productName: '', quantity: 1, price: 0, subtotal: 0 });
      refreshOrderItems();
    });
  }
}

window.handleOrderSubmit = function(e, editId) {
  e.preventDefault();

  const customerId = document.getElementById('of-customer').value;
  const notes = document.getElementById('of-notes').value.trim();

  if (!customerId) {
    showToast('请选择客户', 'error');
    return;
  }

  // Validate items
  const emptyItems = orderFormItems.filter(it => !it.productId || it.quantity <= 0);
  const validItems = orderFormItems.filter(it => it.productId && it.quantity > 0);
  if (emptyItems.length > 0 && validItems.length > 0) {
    showToast('请填写所有商品行或删除空行', 'error');
    return;
  }
  if (validItems.length === 0) {
    showToast('请至少添加一件商品', 'error');
    return;
  }

  const totalAmount = validItems.reduce((s, it) => s + it.subtotal, 0);
  const items = validItems.map(it => ({
    productId: it.productId,
    productName: it.productName,
    quantity: it.quantity,
    price: it.price,
    subtotal: it.subtotal
  }));

  const orders = Store.getOrders();

  if (editId) {
    const idx = orders.findIndex(o => o.id === editId);
    if (idx >= 0) {
      orders[idx].customerId = customerId;
      orders[idx].items = items;
      orders[idx].totalAmount = totalAmount;
      orders[idx].notes = notes;
      orders[idx].updatedAt = new Date().toISOString();
      Store.saveOrders(orders);
      showToast('订单已更新');
    }
  } else {
    const todayStr = new Date().toISOString().split('T')[0];
    const todayDateCompact = todayStr.replace(/-/g, '');
    const todayOrders = orders.filter(o => o.orderNo && o.orderNo.includes(todayDateCompact));
    const maxSeq = todayOrders.reduce((max, o) => {
      const match = o.orderNo.match(/-(\d{3})$/);
      return match ? Math.max(max, parseInt(match[1], 10)) : max;
    }, 0);
    const seq = maxSeq + 1;
    const newOrder = {
      id: uid(),
      orderNo: generateOrderNo(todayStr, seq),
      customerId,
      items,
      totalAmount,
      status: 'pending',
      notes,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    orders.push(newOrder);
    Store.saveOrders(orders);
    showToast('订单已创建');
  }

  closeModal();
  render();
};

          <button class="btn btn-secondary" onclick="openModal('orderForm', '${order.id}')" ${['shipped','completed'].includes(order.status) ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>
            ${Icons.edit} 编辑
          </button>
          <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
        </div>
      </div>
    </div>
  `;
}

window.advanceOrderStatus = function(orderId) {
  const orders = Store.getOrders();
  const order = orders.find(o => o.id === orderId);
  if (!order) return;

  const next = getNextStatus(order.status);
  if (!next) return;

  if (!confirm(`确定要将订单状态推进至「${next.label}」吗？此操作不可撤销`)) return;

  order.status = next.key;
  order.updatedAt = new Date().toISOString();
  Store.saveOrders(orders);

  showToast(`订单状态已更新为「${next.label}」`);
  openModal('orderDetail', orderId);
  // Re-render background if visible
  const contentEl = document.getElementById('view-content');
  if (state.view === 'orders' && contentEl) {
    contentEl.innerHTML = renderOrders();
    bindViewEvents();
  } else if (state.view === 'dashboard' && contentEl) {
    contentEl.innerHTML = renderDashboard();
  }
};

window.handleCustomerSubmit = function(e, editId) {
  e.preventDefault();

  const name = document.getElementById('cf-name').value.trim();
  const contact = document.getElementById('cf-contact').value.trim();
  const phone = document.getElementById('cf-phone').value.trim();
  const address = document.getElementById('cf-address').value.trim();

  if (!name || !contact || !phone) {
    showToast('请填写必填项', 'error');
    return;
  }

  const customers = Store.getCustomers();

  if (editId) {
    const idx = customers.findIndex(c => c.id === editId);
    if (idx >= 0) {
      customers[idx].name = name;
      customers[idx].contact = contact;
      customers[idx].phone = phone;
      customers[idx].address = address;
      Store.saveCustomers(customers);
      showToast('客户信息已更新');
    }
  } else {
    customers.push({
      id: uid(),
      name, contact, phone, company: name, address,
      createdAt: new Date().toISOString()
    });
    Store.saveCustomers(customers);
    showToast('客户已添加');
  }

  closeModal();
  render();
};

/* ========================================
   Modal: Confirm Delete
   ======================================== */
function renderConfirmModal(data) {
  // data is passed as a string from onclick, we need to parse it
  // Actually we handle this differently - see openModal calls
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 class="modal-title">确认删除</h3>
          <button class="modal-close" onclick="closeModal()">${Icons.x}</button>
        </div>
        <div class="modal-body">
          <div class="confirm-body">
            ${Icons.warning}
            <p>确定要删除${data && data.label ? ' ' + escapeHtml(data.label) : ''}吗？</p>
            <p class="confirm-sub">此操作不可恢复</p>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-danger" id="confirm-delete-btn">删除</button>
        </div>
      </div>
    </div>
  `;
}

// Override openModal for confirmDelete to handle data properly
const _originalOpenModal = openModal;
openModal = function(type, data) {
  if (type === 'confirmDelete' && typeof data === 'object') {
    state.modal = { type, data };
    const root = document.getElementById('modal-root');
    root.innerHTML = renderConfirmModal(data);
    const deleteBtn = document.getElementById('confirm-delete-btn');
    if (deleteBtn) {
      deleteBtn.addEventListener('click', () => {
        handleDelete(data.type, data.id);
      });
    }
    return;
  }
  state.modal = { type, data };
  renderModal();
};

function handleDelete(entityType, id) {
  if (entityType === 'order') {
    const orders = Store.getOrders().filter(o => o.id !== id);
    Store.saveOrders(orders);
    showToast('订单已删除');
  } else if (entityType === 'customer') {
    // Check if customer has orders
    const orders = Store.getOrders();
    const hasOrders = orders.some(o => o.customerId === id);
    if (hasOrders) {
      showToast('该客户存在关联订单，无法删除', 'error');
      closeModal();
      return;
    }
    const customers = Store.getCustomers().filter(c => c.id !== id);
    Store.saveCustomers(customers);
    showToast('客户已删除');
  } else if (entityType === 'product') {
    // Check if product has orders
    const orders = Store.getOrders();
    const hasOrders = orders.some(o => o.items.some(it => it.productId === id));
    if (hasOrders) {
      showToast('该商品存在关联订单，无法删除', 'error');
      closeModal();
      return;
    }
    const products = Store.getProducts().filter(p => p.id !== id);
    Store.saveProducts(products);
    showToast('商品已删除');
  }
  closeModal();
  render();
}
